  stages:
  - changelog
  - build
  - release

variables:
  DOCKER_COMPOSE_FILE: ./docker/docker-compose.yml

workflow:
  rules:
    - if: $CI_COMMIT_TAG

generate-changelog:
  stage: changelog
  script:
    - git log $(git describe --tags --abbrev=0 @^)..@ --pretty=format:"- %s" > CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - yCopilot

build-base:
  rules:
    - if: $CI_BASE_TAG
  stage: build
  script:
    - cd ./src/backend
    - docker build -t 10.191.6.39:8085/ycopilot-v2/ycopilot-core:base.v2 -f base.Dockerfile . --build-arg ALL_PROXY=$PROXY
    - docker push 10.191.6.39:8085/ycopilot-v2/ycopilot-core:base.v2

build-core:
  stage: build
  variables:
    PROXY: http://10.191.21.213:10809
  script:
    - cd ./docker
    - VERSION=$CI_COMMIT_TAG PROXY=$PROXY docker compose build backend
    - docker login -u admin -p $CI_JOB_PASSWORD 10.191.6.39:8085
    - docker push 10.191.6.39:8085/ycopilot-v2/ycopilot-core:$CI_COMMIT_TAG
    - docker tag 10.191.6.39:8085/ycopilot-v2/ycopilot-core:$CI_COMMIT_TAG 10.191.6.39:8085/ycopilot-v2/ycopilot-core:latest
    - docker push 10.191.6.39:8085/ycopilot-v2/ycopilot-core:latest
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - yCopilot

build-vectoring:
  stage: build
  variables:
    PROXY: http://10.191.21.213:10809
  script:
    - cd ./docker
    - VERSION=$CI_COMMIT_TAG PROXY=$PROXY docker compose build frontend
    - docker login -u admin -p $CI_JOB_PASSWORD 10.191.6.39:8085
    - docker push 10.191.6.39:8085/ycopilot-v2/ycopilot-manage:$CI_COMMIT_TAG
    - docker tag 10.191.6.39:8085/ycopilot-v2/ycopilot-manage:$CI_COMMIT_TAG 10.191.6.39:8085/ycopilot-v2/ycopilot-manage:latest
    - docker push 10.191.6.39:8085/ycopilot-v2/ycopilot-manage:latest
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - yCopilot

create-release:
  stage: release
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    tag_name: $CI_COMMIT_TAG
    description: './CHANGELOG.md'
    assets:
      links:
        - name: 'yCopilot-Core Docker Image'
          url: 'http://10.191.6.39:8085/ycopilot-v2/ycopilot-core:$CI_COMMIT_TAG'
          link_type: 'image'
        - name: 'yCopilot-Vectoring Docker Image'
          url: 'http://10.191.6.39:8085/ycopilot-v2/ycopilot-manage:$CI_COMMIT_TAG'
          link_type: 'image'
  dependencies:
    - generate-changelog
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - yCopilot