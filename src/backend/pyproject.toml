    "readability>=0.3.2,<1.0.0",
    "readability-lxml>=0.8.4.1,<1.0.0",
    "xlrd>=2.0.1,<3.0.0",
    "openpyxl>=3.1.5,<4.0.0",
    "pypandoc>=1.15,<2.0.0",
    "python-pptx>=1.0.2,<2.0.0",
    "python-docx>=1.1.2,<2.0.0",
    "markdown>=3.8,<4.0.0",
