name = "bisheng"
version = "1.3.1"
description = "A Python package with a built-in web application"
readme = "README.md"
keywords = [
    "nlp",
    "langchain",
    "openai",
    "gpt",
    "gui",
]

[project.urls]
repository = "https://github.com/dataelement/bisheng"

[project.scripts]
bisheng = "bisheng.__main__:main"

[dependency-groups]
dev = [
    "black<24.0.0,>=23.1.0",
    "ipykernel<7.0.0,>=6.21.2",
    "mypy<2.0.0,>=1.1.1",
    "ruff<1.0.0,>=0.0.254",
    "httpx<1.0.0,>=0.27.0",
    "pytest<8.0.0,>=7.2.2",
    "types-requests<3.0.0,>=2.28.11",
    "requests<3.0.0,>=2.28.0",
    "pytest-cov<5.0.0,>=4.0.0",
    "pandas-stubs<3.0.0.0,>=2.0.0.230412",
    "types-pillow<10.0.0.0,>=9.5.0.2",
    "types-appdirs<2.0.0.0,>=1.4.3.5",
    "types-pyyaml<7.0.0.0,>=6.0.12.8",
]



[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra"
testpaths = ["tests", "integration"]
console_output_style = "progress"
filterwarnings = ["ignore::DeprecationWarning"]
log_cli = true

[tool.uv.sources]
"bisheng-langchain" = { path = "./bisheng_langchain-1.3.1-py3-none-any.whl" }


[tool.ruff]
line-length = 120

[[tool.uv.index]]
url = "https://mirrors.ustc.edu.cn/pypi/simple"
default = true
